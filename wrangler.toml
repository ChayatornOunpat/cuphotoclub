name = "cuphotoclub"
pages_build_output_dir = "dist"
compatibility_date = "2025-07-15"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "cuphotoclub-db"
database_id = "dba9417d-8338-4592-b030-6e7e1952e0dc"
migrations_dir = "server/db/migrations/sqlite"
remote = true

[[kv_namespaces]]
binding = "KV"
id = "ef64435cbd844ce1ae71fb7fd5c5fa0f"
remote = true

# Nitro swr route-rule cache (hub.cache). Without this binding the swr rules
# only cache in per-isolate memory, so most visitors still hit a full SSR.
[[kv_namespaces]]
binding = "CACHE"
id = "a3e533bb5602447b9a2eba0c4153a8a5"
remote = true

[[r2_buckets]]
binding = "BLOB"
bucket_name = "cuphotoclub-blob"
remote = true
